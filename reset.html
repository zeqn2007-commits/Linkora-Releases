<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linkora — смена пароля</title>
  <style>
    body { margin: 0; background: #101116; color: #f4f4f5; font: 16px system-ui; display: grid; min-height: 100vh; place-items: center; }
    main { width: min(420px, calc(100% - 48px)); padding: 28px 0; text-align: center; }
    .card { padding: 28px; border: 1px solid #32343d; border-radius: 22px; background: #1b1c22; }
    a { display: block; margin-top: 14px; padding: 13px 18px; border-radius: 12px; background: #9db9ff; color: #14244e; text-decoration: none; font-weight: 700; }
    a.secondary { background: transparent; color: #b9caff; border: 1px solid #545968; }
    p { color: #b7b8c0; line-height: 1.5; }
    #status { min-height: 24px; color: #d4d8e5; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Смена пароля Linkora</h1>
      <p id="description">Нажмите кнопку — в приложении откроется защищённое окно для нового пароля.</p>
      <a id="open" href="linkora://reset-password">Открыть Linkora</a>
      <a id="fallback" class="secondary" href="linkora://reset-password">Попробовать другой способ</a>
      <p id="status" aria-live="polite"></p>
      <a class="secondary" href="https://github.com/zeqn2007-commits/Linkora-Releases/releases/latest">Установить последнюю Linkora</a>
    </div>
  </main>
  <script>
    const input = new URLSearchParams(location.search);
    const output = new URLSearchParams();
    for (const name of ["token", "error"]) {
      const value = input.get(name);
      if (value) output.set(name, value);
    }
    const query = output.toString();
    const target = `linkora://reset-password${query ? `?${query}` : ""}`;
    const intentTarget = `intent://reset-password${query ? `?${query}` : ""}#Intent;scheme=linkora;package=ru.linkora.app;end`;
    const open = document.getElementById("open");
    const fallback = document.getElementById("fallback");
    const status = document.getElementById("status");
    const error = input.get("error");
    const token = input.get("token");

    if (error || !token) {
      document.getElementById("description").textContent = "Ссылка недействительна или уже истекла. Вернитесь в Linkora и запросите новое письмо.";
      open.hidden = true;
      fallback.hidden = true;
    } else {
      open.href = /Android/i.test(navigator.userAgent) ? intentTarget : target;
      fallback.href = target;
      for (const button of [open, fallback]) {
        button.addEventListener("click", () => {
          status.textContent = "Открываем приложение… Если ничего не произошло, установите последнюю версию Linkora и нажмите ещё раз.";
        });
      }
    }
  </script>
</body>
</html>
